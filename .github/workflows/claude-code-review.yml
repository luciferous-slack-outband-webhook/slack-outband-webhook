name: Claude Code Review

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            このPRを**日本語で**レビューしてください。

            ## 前提: 過去のレビューコメントの確認
            レビューを開始する前に、まず以下のコマンドで過去のレビューコメントとその返信を確認してください：

            1. PRのレビューコメント一覧を取得:
               gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments

            2. PRの一般コメント一覧を取得:
               gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments

            3. PRのレビュー一覧を取得:
               gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews

            過去のレビューで指摘された問題が修正されているか確認し、同じ指摘を繰り返さないようにしてください。
            まだ対応されていない過去の指摘があれば、その旨をコメントに含めてください。

            ## レビュー観点
            以下の観点でチェックし、レビューコメントを投稿してください：
            - コード品質とベストプラクティス
            - 潜在的なバグや問題
            - セキュリティへの影響
            - パフォーマンス上の考慮事項

            ## 言語
            レビュー本文は**必ず日本語**で出力してください。英語の表現が混入した場合も日本語に統一してください。
          claude_args: "--allowedTools Bash(gh api *) Read Glob Grep"

      - name: Extract usage from execution file
        id: usage
        if: always()
        continue-on-error: true
        env:
          EXEC_FILE: ${{ steps.claude-review.outputs.execution_file }}
        run: |
          if [ -z "$EXEC_FILE" ] || [ ! -f "$EXEC_FILE" ]; then
            echo "execution_file not found, skipping usage extraction"
            exit 0
          fi

          # stream-json 形式: 各行が JSON オブジェクト。type=="result" の行から usage を抽出する
          RESULT_LINE=$(grep '"type":"result"' "$EXEC_FILE" | tail -1)
          if [ -z "$RESULT_LINE" ]; then
            echo "No result line found in execution file"
            exit 0
          fi

          USAGE_BLOCK=$(echo "$RESULT_LINE" | jq -r '
            "> **Claude 使用量（このジョブ）**\n" +
            "> - 入力トークン: \(.usage.input_tokens // "N/A")\n" +
            "> - 出力トークン: \(.usage.output_tokens // "N/A")\n" +
            "> - キャッシュ作成: \(.usage.cache_creation_input_tokens // 0) / キャッシュ読込: \(.usage.cache_read_input_tokens // 0)\n" +
            "> - コスト: \(if .total_cost_usd then "$\(.total_cost_usd | . * 10000 | round / 10000) USD" else "N/A" end)\n" +
            "> - 実行時間: \(if .duration_ms then "\(.duration_ms / 1000 | . * 10 | round / 10)s" else "N/A" end)"
          ')

          {
            echo "usage_block<<EOF"
            echo "$USAGE_BLOCK"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Prepend usage block to Claude's PR comment
        if: always() && steps.usage.outputs.usage_block != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          USAGE_BLOCK: ${{ steps.usage.outputs.usage_block }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # claude-code-action が投稿した最新の Bot コメントを取得
          COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '[.[] | select(.user.type == "Bot")] | last | .id // empty')

          if [ -z "$COMMENT_ID" ]; then
            echo "No Bot comment found, skipping prepend"
            exit 0
          fi

          # 既存コメント本文を取得
          EXISTING_BODY=$(gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" --jq '.body')

          # 使用量ブロックをコメント先頭に追記して PATCH
          NEW_BODY=$(printf '%s\n\n%s' "$USAGE_BLOCK" "$EXISTING_BODY")

          gh api --method PATCH "repos/${REPO}/issues/comments/${COMMENT_ID}" \
            --field body="$NEW_BODY"

          echo "Successfully prepended usage block to comment #${COMMENT_ID}"
